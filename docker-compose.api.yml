services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: spawn-api
    environment:
      SPAWN_API_PORT: ${SPAWN_API_PORT:-3334}
      SPAWN_PROJECTS_ROOT: ${SPAWN_PROJECTS_ROOT:-/home/dev/.spawn}
      SPAWN_FEDERATION_PUBLIC_ORIGIN: ${SPAWN_FEDERATION_PUBLIC_ORIGIN:-}
      SPAWN_FEDERATION_ACTOR: ${SPAWN_FEDERATION_ACTOR:-spawn}
    ports:
      - "${SPAWN_API_BIND_HOST:-127.0.0.1}:${SPAWN_API_PORT:-3334}:${SPAWN_API_PORT:-3334}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SPAWN_PROJECTS_ROOT_HOST:-/home/dev/.spawn}:${SPAWN_PROJECTS_ROOT:-/home/dev/.spawn}
    restart: unless-stopped
